# ════════════════════════════════════════════════════════════════
# MediaCloud — Docker Compose (Raspberry Pi 5 Production)
# ════════════════════════════════════════════════════════════════

services:
  mediacloud:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    container_name: mediacloud
    ports:
      - "3000:3000"

    volumes:
      # ── Physical drive mounts (EXACT Pi 5 paths) ──
      # sda1: NTFS "Elements" partition → admin-only storage
      - /mnt/windows:/app/storage/windows_mount:rw
      # sda2: ext4 "mediacloud" dir → standard user storage + _tmp chunks
      - /mnt/storage/mediacloud:/app/storage/ext4_mount:rw
      # ── SQLite database persistence ──
      # Named volume so the DB file survives container rebuilds.
      # The DB lives at /app/data/mediacloud.db inside the container.
      - sqlite_data:/app/data

    env_file:
      - .env.production

    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/mediacloud.db
      - EXT4_MOUNT_PATH=/app/storage/ext4_mount
      - NTFS_MOUNT_PATH=/app/storage/windows_mount
      - PORT=3000

    restart: unless-stopped

    # ── Resource limits for Pi 5 (4GB RAM) ──
    mem_limit: 512m
    memswap_limit: 768m

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sqlite_data:
    driver: local
